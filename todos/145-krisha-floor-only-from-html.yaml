title: Krisha листинг не отдаёт floor/floors_total — поля заполняются только через HTML-деталку
status: done
created_at: 23.04.2026
completed_at: 23.04.2026

description: |
  В сыром JSON `advert` (подтверждено на 15+ объявлениях) нет ключей
  `floor` и `floorCount`. Floor и floors_total извлекаются только из
  HTML (через `AdvertInfoHtmlExtractor` — парсит элементы
  `div.offer__info-item[data-name="flat.floor"]` и fallback по тексту
  заголовка).

  Это значит: при массовом импорте через листинг (без захода в
  деталку) floor/floors_total будут пустыми. Пока в пайплайне есть
  `DetailFetcher`, который для каждого объявления ходит на его
  страницу — тогда флаги подтянутся. Но это даёт N дополнительных
  запросов на листинге.

recommendation: |
  - Зафиксировать в докстринге `AdvertCoreMapper`, что floor/floors_total
    всегда None на уровне core, заполняются детальным HTML-парсером.
  - Если нужно ускорить импорт без похода на деталку — попытаться
    извлечь floor/floors_total из `title` (например, регэксп
    `\d+/\d+ этаж`) прямо в `core_mapper`. Часть объявлений
    содержит этаж в тексте заголовка.
  - Рассмотреть опцию частичного импорта: сначала листинг для быстрой
    индексации (без HTML), потом фоновая подгрузка деталей батчами.

solution: |
  Выбран минимальный вариант — докстринг в `AdvertCoreMapper`.

  В `src/property/services/krisha_scraping/advert_core_mapper.py`
  добавлен class-docstring с описанием контракта core-маппера. В нём
  явно зафиксировано: поля `floor` и `floors_total` всегда `None` на
  уровне core, т.к. в сыром JSON Krisha их нет; они заполняются только
  HTML-парсером (`AdvertInfoHtmlExtractor`) при заходе на страницу
  деталки.

  Регэксп по title не добавлялся — это over-engineering. Если в будущем
  потребуется быстрый импорт без похода на деталку, это отдельная
  задача (и тогда можно будет рассмотреть двухфазный импорт, как
  предложено в рекомендациях).

  Линтер: `uv run ruff check addons/estate_kit/src/property/services/krisha_scraping/`
  проходит без замечаний.
