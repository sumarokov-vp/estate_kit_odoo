id: 128
title: "Комиссия: computed expected_revenue на crm.lead"
priority: high
depends_on: [126, 127]
status: done
completed_at: 30.03.2026
context: |
  Сделать expected_revenue вычисляемым полем (computed, not stored) на crm.lead.

  Формула: expected_revenue = estimated_price × commission_rate / 100

  Определение estimated_price по приоритету:
  1. property_id.listing_price — если объект привязан
  2. Среднее из search_price_min / search_price_max — если заданы фильтры
  3. 0 (AI-оценка добавится на этапе 3)

  commission_rate — результат CommissionService.get_rate(lead).

  @api.depends('property_id.listing_price', 'search_price_min', 'search_price_max')

  Документация: docs/tech-docs/docs/commissions.md, раздел "Расчёт ожидаемого дохода"
solution: |
  Переопределено поле expected_revenue в src/lead/models/crm_lead.py как computed (not stored).
  Формула: estimated_price * commission_rate / 100.
  estimated_price определяется по приоритету: listing_price > среднее фильтров > одно значение > 0.
  commission_rate получается через CommissionFactory.create(env).get_rate(lead).
  @api.depends покрывает property_id.listing_price, search_price_min, search_price_max.
