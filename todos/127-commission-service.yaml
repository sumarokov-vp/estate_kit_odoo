context: |
  DDD-сервис для получения применимой ставки комиссии для лида.

  Структура:
    src/lead/services/commission/
    ├── factory.py
    ├── service.py              # Фасад: get_rate(lead) → float
    ├── protocols/
    │   └── i_rate_provider.py  # Protocol: get_rate(lead) → float
    └── settings_rate_provider.py  # Читает estate_kit.min_commission_percent

  Логика (этап 1): возвращает min_commission_percent из настроек.
  В будущем (этап 2) добавится MlsRateProvider с приоритетом над настройками.

  Документация: docs/tech-docs/docs/commissions.md, раздел "Use Case"
solution: |
  Создан пакет src/lead/services/commission/ по DDD-паттерну проекта:
  - protocols/i_rate_provider.py — Protocol с методом get_rate(lead) → float
  - settings_rate_provider.py — читает estate_kit.min_commission_percent из ir.config_parameter
  - service.py — фасад CommissionService с get_rate(lead), делегирует IRateProvider
  - factory.py — собирает SettingsRateProvider и CommissionService
