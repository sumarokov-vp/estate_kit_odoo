title: "Вкладка «Маркетинг» на карточке объекта"
status: done
created_at: 22.03.2026
completed_at: 22.03.2026

description: |
  Добавить вкладку «Маркетинг» на форму estate.property.
  Содержимое: список размещений (One2many placement_ids) с цветовой индикацией статусов.
  Отображаемые колонки: канал, статус, дата начала, дата окончания, стоимость, ссылка.

recommendation: |
  Расширить существующий view estate.property через наследование.
  Добавить page "Маркетинг" с tree-виджетом для placement-ов.
  Зависит от: 087-placement-model.

solution: |
  1. Добавлено поле placement_ids (One2many) в estate.property (секция «Маркетинг»).
  2. Добавлена вкладка «Маркетинг» на форму estate.property с inline-редактируемым списком размещений.
     Колонки: канал, статус (badge с цветовой индикацией), дата начала, дата окончания, стоимость, ссылка.
  3. Добавлено отображение tag_ids (many2many_tags с цветами) в шапке формы объекта.
