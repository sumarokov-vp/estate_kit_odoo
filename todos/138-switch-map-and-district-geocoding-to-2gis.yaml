title: Перевести карту в карточке и геокодирование районов на 2GIS
status: open
created_at: 18.04.2026
completed_at: null

description: |
  Сейчас в карточке объекта недвижимости карта и геокодирование районов
  используют Яндекс Карты. API-ключ Яндекса привязан к IP, что регулярно
  приводит к ошибкам 403 при смене IP на dev-окружении.

  Нужно перевести:
  1. Отображение карты в карточке объекта на 2GIS.
  2. Геокодирование (определение района по координатам) также на 2GIS.

recommendation: |
  В проекте уже используется 2GIS (ключ хранится в настройках, см. todo 070
  про вынос ключа из property). Нужно:
  - Заменить виджет карты на 2GIS Maps API в форме property.
  - Заменить вызовы Яндекс Геокодера на 2GIS Geocoder API в сервисе
    определения района (см. todo 040 — extract-geocoder-service, todo 077 —
    extract-district-detection).
  - Удалить настройку Яндекс Геокодер API из Settings (если она больше
    нигде не используется) или пометить как устаревшую.
  - Проверить, что лимиты 2GIS покрывают нагрузку геокодирования.
  - Обновить документацию по интеграциям.

solution: null
