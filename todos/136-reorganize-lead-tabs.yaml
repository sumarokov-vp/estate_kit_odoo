description: |
  Три изменения в форме лида:
  1. Секция «Недвижимость» (под табами) + таб «Подобранные объекты» → новый таб «Недвижимость» на 2-й позиции.
     Содержимое таба: property_id (выбранный объект), таблица подобранных, ответственные (ISA, buyer_agent, transaction_coordinator).
  2. Секция «Маркетинг» из таба «Контакты» → отдельный таб.
  3. Таб «Подобранные объекты» удаляется (вошёл в «Недвижимость»).

recommendation: |
  Отредактировать crm_lead_views.xml:
  - Заменить xpath //sheet/group[estate_info] на xpath в notebook с новым табом «Недвижимость»
  - Перенести содержимое таба matching внутрь нового таба
  - Добавить xpath для перемещения Marketing группы из Contacts в отдельный таб

solution: |
  Реорганизованы табы формы лида:
  - Секция «Недвижимость» и таб «Подобранные объекты» объединены в таб «Недвижимость»
  - Группа «Маркетинг» вынесена из «Контактов» в отдельный таб
  - Скрыты probability, email из шапки (перенесён в «Контакты»)
  - Добавлен таб «Заметки» взамен скрытого internal_notes
  - Порядок: Потребность → Контакты → Недвижимость → Маркетинг → Заметки → Telegram
