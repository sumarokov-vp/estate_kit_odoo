title: Krisha возвращает транслит имени города (Almaty, Zhanaturmys), CityResolver ищет по русскому
status: done
created_at: 23.04.2026
completed_at: 23.04.2026

description: |
  Теперь, когда `AdvertCoreMapper` берёт city из `address.city`
  (см. правку в рамках todo 139), в detail-маппер приходит имя
  города на транслите: `Almaty`, `Zhanaturmys`, `Astana` и т.п.

  В БД `estate.city` хранится русское название: `Алматы`, `Астана`.
  `CityResolver.resolve` ищет по `name =ilike` и по `code =ilike`.
  Если `code` поля настроены как `almaty` / `astana` — совпадение будет,
  иначе — город не резолвится, и объявление импортируется без города.

recommendation: |
  - Проверить значения `code` в таблице `estate.city`.
  - Если `code` не транслитные — либо завести отдельный маппинг
    `krisha_name` → `estate.city`, либо завести поле
    `estate.city.krisha_code` и настроить справочник.
  - Можно также проверить поле `addressTitle` (строка «Алматы» /
    «Астана» + улица на русском) и извлекать из него первый сегмент
    до запятой для listing (где `addressTitle` присутствует как поле
    advert).

solution: |
  Проверено: поле `code` в `addons/estate_kit/data/estate_city_data.xml`
  для всех 28 городов уже заполнено транслитом, совпадающим со
  значениями из `advert.address.city` от Krisha (almaty, astana, shymkent,
  karaganda, taraz, pavlodar, ust-kamenogorsk, semey, atyrau, kostanay
  и т.д.).

  `CityResolver.resolve` во втором запросе использует
  `("code", "=ilike", needle)` — это case-insensitive equality в Odoo,
  поэтому `Almaty`, `ALMATY`, `almaty` одинаково матчатся с code=`almaty`.
  Для базовых городов справочника ничего менять не нужно — резолв уже
  работает корректно.

  Остающаяся проблема с райоными/посёлочными значениями (например
  `Zhanaturmys`, которые Krisha кладёт в `address.city` вместо самого
  города) покрывается отдельной задачей todo 142
  (fallback из `addressTitle`) — дублирования не делаем.

  Код `CityResolver` и код заполнения `code` в data.xml не менялись.
  Линтер `ruff check` по сервису krisha_import — чистый.
