services:
  erp-core-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: estate_kit_erp
      POSTGRES_USER: erp_core
      POSTGRES_PASSWORD: ${ERP_CORE_DB_PASSWORD}
    volumes:
      - erp-core-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "erp_core", "-d", "estate_kit_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./docs/user:/srv/docs/user:ro
      - ./docs/tech:/srv/docs/tech:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      odoo:
        condition: service_healthy

  odoo:
    image: estate_kit:latest
    restart: unless-stopped
    command:
      - "odoo"
      - "--addons-path=/mnt/extra-addons"
      - "--db-filter=^royal_estate$"
    ports:
      - "10.114.0.3:8069:8069"
    volumes:
      - odoo-data:/var/lib/odoo
      - ./addons:/mnt/extra-addons:ro
    environment:
      - HOST=${DB_HOST}
      - PORT=${DB_PORT:-5432}
      - USER=${DB_USER}
      - PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069/web/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  odoo-data:
  caddy-data:
  caddy-config:
  erp-core-db-data:
